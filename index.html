<html lang="zh-CN">
<head>

        * {

            padding: 0;
            box-sizing: border-box;
        }

        body {

            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 50px 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.8em;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.95;
            margin-bottom: 5px;
        }

        .header-subtitle {
            font-size: 0.95em;
            opacity: 0.85;
        }

        .content {
            padding: 40px 30px;
        }

        .question-container {
            display: none;
        }

        .question-container.active {
            display: block;
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e5e7eb;
            border-radius: 10px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s ease;
        }

        .progress-text {
            text-align: center;
            color: #666;
            font-size: 0.9em;
            margin-bottom: 20px;
        }

        .question-title {
            font-size: 1.5em;
            color: #333;
            margin-bottom: 25px;
            font-weight: 600;
        }

        .question-category {
            display: inline-block;
            background: #f0f4ff;
            color: #667eea;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .option {
            padding: 18px 20px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            background: white;
        }

        .option:hover {
            border-color: #667eea;
            background: #f9fafb;
            transform: translateX(5px);
        }

        .option.selected {
            border-color: #667eea;
            background: #f0f4ff;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.15);
        }

        .option-text {
            font-weight: 500;
            color: #333;
            font-size: 1.05em;
        }

        .option-score {
            font-size: 0.9em;
            color: #999;
            margin-top: 5px;
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 40px;
            justify-content: space-between;
        }

        button {
            padding: 14px 32px;
            font-size: 1em;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-prev {
            background: #f3f4f6;
            color: #333;
            flex: 1;
        }

        .btn-prev:hover:not(:disabled) {
            background: #e5e7eb;
        }

        .btn-prev:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-next {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            flex: 1;
        }

        .btn-next:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-next:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* 结果页面 */
        .result-page {
            display: none;
            animation: fadeIn 0.5s;
        }

        .result-page.active {
            display: block;
        }

        .result-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .result-type {
            font-size: 2.5em;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 10px;
        }

        .result-description {
            font-size: 1.15em;
            color: #555;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .result-card {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 20px;
            border-left: 4px solid #667eea;
        }

        .result-card.hobby {
            border-left-color: #f59e0b;
            background: linear-gradient(135deg, #fffbeb 0%, #fef3c7 100%);
        }

        .result-card.emotion {
            border-left-color: #ef4444;
            background: linear-gradient(135deg, #fef2f2 0%, #fee2e2 100%);
        }

        .result-card.social {
            border-left-color: #10b981;
            background: linear-gradient(135deg, #ecfdf5 0%, #d1fae5 100%);
        }

        .result-card h3 {
            font-size: 1.3em;
            margin-bottom: 12px;
            color: #333;
        }

        .result-card p {
            color: #555;
            line-height: 1.6;
            font-size: 1em;
        }

        .traits-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 30px;
        }

        .trait-badge {
            background: white;
            padding: 15px 20px;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            border: 2px solid #e5e7eb;
        }

        .trait-badge h4 {
            color: #667eea;
            font-size: 0.95em;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .trait-value {
            font-size: 1.8em;
            font-weight: 700;
            color: #333;
        }

        .trait-unit {
            font-size: 0.85em;
            color: #999;
        }

        .score-bar {
            width: 100%;
            height: 8px;
            background: #e5e7eb;
            border-radius: 4px;
            margin-top: 10px;
            overflow: hidden;
        }

        .score-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s ease;
        }

        .button-group-result {
            display: flex;
            gap: 15px;
            margin-top: 40px;
            justify-content: center;
        }

        .btn-restart {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 40px;
            flex: 1;
            max-width: 300px;
        }

        .btn-share {
            background: #10b981;
            color: white;
            padding: 15px 40px;
            flex: 1;
            max-width: 300px;
        }

        .btn-restart:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-share:hover {
            background: #059669;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(16, 185, 129, 0.3);
        }

        .start-page {
            text-align: center;
            padding: 40px 20px;
        }

            display: none;
        }

        .start-emoji {
            font-size: 5em;
            margin-bottom: 20px;
        }

        .start-description {
            font-size: 1.1em;
            color: #555;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .start-features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }

        .feature {
            padding: 20px;
            background: #f9fafb;
            border-radius: 10px;
            border: 2px solid #e5e7eb;
        }

        .feature-emoji {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

            color: #333;
        }

        .btn-start {

            color: white;
            padding: 18px 50px;
            font-size: 1.1em;
            margin-top: 30px;

            padding: 20px;
            text-align: center;
            color: #666;
            font-size: 0.9em;
            border-top: 1px solid #e5e7eb;

            }

                font-size: 1.3em;
            }

            .option {
                padding: 15px 16px;
            }

            .start-features {
                grid-template-columns: 1fr;
            }
        }

</head>

                hobby: '多才多艺，热爱探索',
                emotion: '热情而开放',
                social: '社交型、外向、主动'
            },
            'THINKER': {
                name: '思考者',
                emoji: '🧠',
                description: '你是一个理性、深思熟虑的人。你注重逻辑和分析，倾向于独处和沉思。你的情感控制得当，社交较为谨慎。你追求理解和真理，喜欢深度思考。',
                hobby: '专注、深度的兴趣',
                emotion: '理性而内敛',
                social: '内向型、谨慎、深思'
            },
            'CREATOR': {
                name: '创造者',
                emoji: '🎨',
                description: '你是一个富有创意和想象力的人。你倾向于用独特的方式表达自己，对艺术和美感敏感。你的情感表达独特，社交风格也较为个性化。你喜欢打破常规，追求自我实现。',
                hobby: '创意、艺术、个性',
                emotion: '敏感而富有表达力',
                social: '独立型、创新、个性'
            },
            'CONNECTOR': {
                name: '连接者',
                emoji: '🤝',
                description: '你是一个温暖、善解人意的人。你重视关系和联系，具有很强的共情能力。你的情感温和而稳定，社交活跃但不失分寸。你是天生的调解者和支持者，能给他人带来安慰和信任。',
                hobby: '人际互动、帮助他人',
                emotion: '温暖而稳定',
                social: '友善型、支持、平衡'
            },
            'ACHIEVER': {
                name: '成就者',
                emoji: '🏆',
                description: '你是一个目标导向、充满动力的人。你有明确的目标和计划，且有执行力。你的情感受到目标和成就的驱动，社交为了实现目标而展开。你追求卓越和认可，是团队中的推动力。',
                hobby: '竞技、挑战、目标',
                emotion: '驱动而专注',
                social: '进取型、领导、实效'
            }
        };

        let currentQuestion = 0;
        let answers = {};
        let scores = { hobby: 0, emotion: 0, social: 0 };

        function startTest() {
            document.getElementById('startPage').classList.add('hidden');
            const testPage = document.getElementById('testPage');
            testPage.classList.remove('hidden');
            
            // 生成题目
            const container = document.getElementById('questionsContainer');
            questions.forEach((q, index) => {
                const div = document.createElement('div');
                div.className = 'question-container' + (index === 0 ? ' active' : '');
                div.id = 'question-' + q.id;
                
                let optionsHTML = '';
                q.options.forEach(option => {
                    optionsHTML += `
                        <div class="option" onclick="selectOption(${q.id}, ${option.value}, this)" data-value="${option.value}">
                            <div class="option-text">${option.text}</div>
                        </div>
                    `;
                });

                div.innerHTML = `
                    <div class="question-category">${q.category}</div>
                    <div class="question-title">${q.title}</div>
                    <div class="options">${optionsHTML}</div>
                `;
                container.appendChild(div);
            });

            document.getElementById('totalQuestions').textContent = questions.length;
            updateProgress();
        }

        function selectOption(qId, value, element) {
            // 移除同组的其他选择
            const parent = element.parentElement;
            parent.querySelectorAll('.option').forEach(opt => opt.classList.remove('selected'));
            element.classList.add('selected');

            // 记录答案
            const question = questions.find(q => q.id === qId);
            answers[qId] = value;
            const type = question.options.find(o => o.value === value).type;
            
            // 启用下一题按钮
            document.getElementById('btnNext').disabled = false;
        }

        function nextQuestion() {
            if (currentQuestion < questions.length - 1) {
                if (!answers[currentQuestion + 1]) {
                    alert('请先选择一个答案！');
                    return;
                }
                currentQuestion++;
                updateQuestion();
            } else if (currentQuestion === questions.length - 1) {
                if (!answers[questions.length]) {
                    alert('请先选择一个答案！');
                    return;
                }
                calculateResults();
            }
        }

        function previousQuestion() {
            if (currentQuestion > 0) {
                currentQuestion--;
                updateQuestion();
            }
        }

        function updateQuestion() {
            // 隐藏所有问题
            document.querySelectorAll('.question-container').forEach(q => q.classList.remove('active'));
            // 显示当前问题
            document.getElementById('question-' + (currentQuestion + 1)).classList.add('active');

            // 恢复之前的选择
            if (answers[currentQuestion + 1]) {
                const currentQContainer = document.getElementById('question-' + (currentQuestion + 1));
                const options = currentQContainer.querySelectorAll('.option');
                options.forEach(opt => {
                    if (parseInt(opt.dataset.value) === answers[currentQuestion + 1]) {
                        opt.classList.add('selected');
                    }
                });
            }

            updateProgress();
        }

        function updateProgress() {
            document.getElementById('currentQuestion').textContent = currentQuestion + 1;
            const progress = ((currentQuestion + 1) / questions.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';

            // 更新按钮状态
            document.getElementById('btnPrev').disabled = currentQuestion === 0;
            document.getElementById('btnNext').disabled = !answers[currentQuestion + 1];

            // 最后一题时，改变按钮文本
            if (currentQuestion === questions.length - 1) {
                document.getElementById('btnNext').textContent = '完成测试 ✓';
            } else {
                document.getElementById('btnNext').textContent = '下一题 →';
            }
        }

        function calculateResults() {
            // 计算各维度得分
            questions.forEach(q => {
                const answer = answers[q.id];
                const type = q.options.find(o => o.value === answer).type;
                
                if (type === 'hobby') scores.hobby += answer;
                else if (type === 'emotion') scores.emotion += answer;
                else if (type === 'social') scores.social += answer;
            });

            // 标准化得分
            scores.hobby = Math.round((scores.hobby / 25) * 100);
            scores.emotion = Math.round((scores.emotion / 30) * 100);
            scores.social = Math.round((scores.social / 25) * 100);

            // 确定人格类型
            const personalityType = determinePersonality();

            // 显示结果
            showResults(personalityType);
        }

        function determinePersonality() {
            // 基于三个维度的得分确定人格类型
            const h = scores.hobby;
            const e = scores.emotion;
            const s = scores.social;

            // 爱好: 高=探险/创意, 低=稳定
            // 情感: 高=内敛/深思, 低=外向/热情
            // 社交: 高=独立, 低=联系/团队

            if (h > 60 && s > 60) return 'SEEKER'; // 探索者
            if (h < 40 && e > 60) return 'THINKER'; // 思考者
            if (h > 60 && e < 40) return 'CREATOR'; // 创造者
            if (e < 50 && s < 50) return 'CONNECTOR'; // 连接者
            return 'ACHIEVER'; // 成就者
        }

        function showResults(type) {
            document.getElementById('testPage').classList.add('hidden');
            const resultPage = document.getElementById('resultPage');
            resultPage.classList.add('active');

            const personality = personalityTypes[type];

            document.getElementById('resultEmoji').textContent = personality.emoji;
            document.getElementById('resultType').textContent = personality.name;
            document.getElementById('resultDescription').textContent = personality.description;

            // 显示详细卡片
            const detailsHTML = `
                <div class="result-card hobby">
                    <h3>🎮 爱好特征</h3>
                    <p>${personality.hobby}</p>
                    <div class="score-bar">
                        <div class="score-fill" style="width: ${scores.hobby}%; background: linear-gradient(90deg, #f59e0b 0%, #d97706 100%);"></div>
                    </div>
                </div>
                <div class="result-card emotion">
                    <h3>❤️ 情感特质</h3>
                    <p>${personality.emotion}</p>
                    <div class="score-bar">
                        <div class="score-fill" style="width: ${scores.emotion}%; background: linear-gradient(90deg, #ef4444 0%, #dc2626 100%);"></div>
                    </div>
                </div>
                <div class="result-card social">
                    <h3>👥 社交风格</h3>
                    <p>${personality.social}</p>
                    <div class="score-bar">
                        <div class="score-fill" style="width: ${scores.social}%; background: linear-gradient(90deg, #10b981 0%, #059669 100%);"></div>
                    </div>
                </div>
            `;
            document.getElementById('resultDetails').innerHTML = detailsHTML;

            // 显示得分
            const traitsHTML = `
                <div class="trait-badge">
                    <h4>🎮 爱好指数</h4>
                    <div class="trait-value">${scores.hobby}<span class="trait-unit">%</span></div>
                </div>
                <div class="trait-badge">
                    <h4>❤️ 情感指数</h4>
                    <div class="trait-value">${scores.emotion}<span class="trait-unit">%</span></div>
                </div>
                <div class="trait-badge">
                    <h4>👥 社交指数</h4>
                    <div class="trait-value">${scores.social}<span class="trait-unit">%</span></div>
                </div>
            `;
            document.getElementById('traitsContainer').innerHTML = traitsHTML;

            // 保存结果
            window.lastResult = { type, personality, scores };
        }

        function restartTest() {
            currentQuestion = 0;
            answers = {};
            scores = { hobby: 0, emotion: 0, social: 0 };

            document.getElementById('resultPage').classList.remove('active');
            document.getElementById('startPage').classList.remove('hidden');
            document.getElementById('testPage').classList.add('hidden');

            // 清空问题容器
            document.getElementById('questionsContainer').innerHTML = '';
        }

        function shareResult() {
            if (!window.lastResult) return;

            const { type, personality, scores } = window.lastResult;
            const text = `我在 SBTI 人格测试中是「${personality.name}${personality.emoji}」\n爱好指数: ${scores.hobby}% | 情感指数: ${scores.emotion}% | 社交指数: ${scores.social}%\n👉 来发现你真实的人格类型吧！`;

            if (navigator.share) {
                navigator.share({
                    title: 'SBTI 人格测试',
                    text: text
                });
            } else {
                const textArea = document.createElement('textarea');
                textArea.value = text;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                alert('结果已复制到剪贴板！');
            }
        }
    </script>
</body>
</html>
